plugins {
    id 'application'
}

group = 'com.rodak'
version = '1.0'

sourceSets {
    main {
        java {
            srcDirs = ['src']
        }
        resources {
            srcDirs = ['resources']
        }
    }
}

application {
    mainClass = 'com.rodak.termitaire.Termitaire'
}

jar {
    manifest {
        attributes('Main-Class': 'com.rodak.termitaire.Termitaire')
    }
    
    duplicatesStrategy = DuplicatesStrategy.INCLUDE

    from sourceSets.main.output
    from('resources') {
        into('')
    }
}